name: Fix BG frontmatter
on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix double frontmatter delimiters in all bg/ files
        run: |
          count=0
          while IFS= read -r -d '' f; do
            first_two=$(head -2 "$f" | tr '\n' '|')
            if echo "$first_two" | grep -q '^---|---'; then
              tail -n +2 "$f" > /tmp/fix.tmp && mv /tmp/fix.tmp "$f"
              count=$((count + 1))
              echo "Fixed double delimiter: $f"
            fi
          done < <(find bg -name "*.mdx" -print0)
          echo "Total fixed: $count"

      - name: Fix files missing closing frontmatter delimiter
        run: |
          count=0
          while IFS= read -r -d '' f; do
            first_line=$(head -1 "$f")
            if [ "$first_line" = "---" ]; then
              delim_count=$(grep -c '^---$' "$f" || true)
              if [ "$delim_count" -lt 2 ]; then
                awk 'NR==1{print;next} /^---$/{found++;print;next} !found && /^$/{print "---"; found=1} {print}' "$f" > /tmp/fix.tmp && mv /tmp/fix.tmp "$f"
                count=$((count + 1))
                echo "Fixed missing delimiter: $f"
              fi
            fi
          done < <(find bg -name "*.mdx" -print0)
          echo "Total fixed: $count"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bg/
          git diff --cached --quiet && echo "No changes" || (git commit -m "Fix broken frontmatter in all bg/ translated files (recursive)" && git push)
