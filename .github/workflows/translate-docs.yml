name: Translate Documentation

on:
  workflow_dispatch:
    inputs:
      target_language:
        description: 'Target language code (e.g., bg for Bulgarian)'
        required: true
        default: 'bg'
      target_dir:
        description: 'Target directory for translations'
        required: true
        default: 'bg'
      only_files:
        description: 'Comma-separated list of specific files to translate (leave empty for all)'
        required: false
        default: ''

  # Also runs after sync-updates completes
  workflow_run:
    workflows: ["Sync Updates from Upstream"]
    types:
      - completed

jobs:
  translate:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic deep-translator pyyaml

      - name: Run translation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRANSLATOR: 'claude'
          TARGET_LANG: ${{ github.event.inputs.target_language || 'bg' }}
          TARGET_DIR: ${{ github.event.inputs.target_dir || 'bg' }}
          ONLY_FILES: ${{ github.event.inputs.only_files || '' }}
          SOURCE_DIR: '.'
        run: |
          python .github/scripts/translate.py

      - name: Commit and push translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No translation changes to commit"
          else
            git commit -m "Auto-translate docs to ${{ github.event.inputs.target_language || 'bg' }}"
            git push
          fi
